<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="sidebar">
    <h2>CRM</h2>
    <a href="#">Dashboard</a>
    <a href="#">Clients</a>
    <a href="#">Settings</a>
</div>

<div class="main">

    <h1>Admin Dashboard</h1>

    <div class="cards">
        <div class="card-box">
            <h3>Total Clients</h3>
            <p>{{ clients|length }}</p>
        </div>

        <div class="card-box">
            <h3>Active</h3>
            <p>{{ clients|length }}</p>
        </div>
    </div>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Action</th>
        </tr>

        {% for client in clients %}
        <tr>
            <td>{{ client.id }}</td>
            <td>{{ client.name }}</td>
            <td>{{ client.email }}</td>
            <td><a href="/edit/{{ client.id }}">Edit</a></td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
