<body>
<div class="container">
    <div class="card">

        <h1>Admin Dashboard</h1>

        <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Action</th>
        </tr>

        {% for client in clients %}
        <tr>
            <td>{{ client.id }}</td>
            <td>{{ client.name }}</td>
            <td>{{ client.email }}</td>
            <td><a href="/edit/{{ client.id }}">Edit</a></td>
        </tr>
        {% endfor %}

        </table>

    </div>
</div>
</body>
